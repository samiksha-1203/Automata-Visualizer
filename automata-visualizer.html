<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automata Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F8F9FE;--panel:#FFFFFF;--blue:#E3F2FD;--blue-d:#1565C0;--blue-m:#42A5F5;
  --lav:#F3E5F5;--lav-d:#6A1B9A;--lav-m:#AB47BC;
  --mint:#E8F5E9;--mint-d:#1B5E20;--mint-m:#66BB6A;
  --amber:#FFF8E1;--amber-d:#E65100;
  --red:#FFEBEE;--red-d:#B71C1C;
  --text:#1A1A2E;--text2:#5C6078;--text3:#9BA0B4;
  --border:#E2E8F0;--shadow:0 2px 12px rgba(0,0,0,.06);
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}
.app{display:grid;grid-template-columns:260px 1fr 300px;grid-template-rows:52px 1fr;height:100vh;}
.topbar{grid-column:1/-1;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;}
.topbar h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--blue-d),var(--lav-d));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.3px;}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;cursor:pointer;transition:all .2s;}
.badge.active{background:var(--blue-d);color:#fff;}
.badge.inactive{background:var(--blue);color:var(--blue-d);}
.topbar-right{margin-left:auto;display:flex;gap:8px;}
/* LEFT PANEL */
.left-panel{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:14px;}
.section-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin:14px 0 8px;}
.btn{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--panel);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-align:left;transition:all .18s;display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.btn:hover{border-color:var(--blue-m);background:var(--blue);transform:translateY(-1px);box-shadow:0 3px 8px rgba(21,101,192,.1);}
.btn.danger:hover{border-color:#EF5350;background:var(--red);}
.btn .icon{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.btn-primary{background:var(--blue-d);color:#fff;border-color:var(--blue-d);}
.btn-primary:hover{background:#0D47A1;border-color:#0D47A1;transform:translateY(-1px);box-shadow:0 4px 12px rgba(21,101,192,.3);}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.mode-btn{padding:8px 6px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--panel);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .18s;color:var(--text2);}
.mode-btn.active{background:var(--blue-d);color:#fff;border-color:var(--blue-d);}
.input-row{margin-bottom:8px;}
.input-row label{display:block;font-size:11px;color:var(--text3);font-weight:500;margin-bottom:4px;}
.input-row input,.input-row select{width:100%;padding:7px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-family:'Inter',sans-serif;font-size:12px;color:var(--text);background:var(--bg);outline:none;transition:border .18s;}
.input-row input:focus,.input-row select:focus{border-color:var(--blue-m);}
.divider{height:1px;background:var(--border);margin:12px 0;}
/* CANVAS */
.canvas-wrap{position:relative;background:var(--bg);overflow:hidden;}
canvas{display:block;}
.canvas-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:.5;}
.canvas-hint p{font-size:13px;color:var(--text3);margin-top:6px;}
.canvas-tools{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:var(--panel);padding:6px;border-radius:20px;border:1px solid var(--border);box-shadow:var(--shadow);}
.tool-btn{padding:6px 14px;border-radius:16px;border:none;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;color:var(--text2);background:transparent;}
.tool-btn.active{background:var(--blue-d);color:#fff;}
.tool-btn:hover:not(.active){background:var(--blue);color:var(--blue-d);}
/* RIGHT PANEL */
.right-panel{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);padding:12px;}
.card-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;}
.sim-string{display:flex;gap:6px;margin-bottom:10px;}
.sim-string input{flex:1;padding:7px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;color:var(--text);background:var(--panel);outline:none;}
.sim-string input:focus{border-color:var(--blue-m);}
.run-btn{padding:7px 12px;border-radius:var(--radius-sm);border:none;background:var(--blue-d);color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;}
.run-btn:hover{background:#0D47A1;transform:scale(1.02);}
.sim-controls{display:flex;gap:6px;margin-bottom:8px;justify-content:center;}
.sim-btn{padding:5px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--panel);color:var(--text2);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;}
.sim-btn:hover{background:var(--blue);border-color:var(--blue-m);}
.sim-btn:disabled{opacity:.3;cursor:not-allowed;}
.step-log{max-height:160px;overflow-y:auto;font-size:11px;}
.step-item{padding:5px 8px;border-radius:6px;margin-bottom:3px;display:flex;align-items:center;gap:6px;border:1px solid transparent;transition:all .2s;}
.step-item.active{background:var(--blue);border-color:var(--blue-m);}
.step-item.done{background:var(--mint);border-color:var(--mint-m);}
.step-item .step-state{font-weight:700;color:var(--blue-d);min-width:20px;}
.result-badge{padding:10px 16px;border-radius:var(--radius);text-align:center;font-size:15px;font-weight:700;letter-spacing:.5px;}
.result-badge.accept{background:var(--mint);color:var(--mint-d);}
.result-badge.reject{background:var(--red);color:var(--red-d);}
.trans-table{width:100%;font-size:11px;border-collapse:collapse;}
.trans-table th{background:var(--blue);color:var(--blue-d);padding:5px 8px;text-align:center;font-weight:700;border:1px solid var(--border);}
.trans-table td{padding:4px 8px;text-align:center;border:1px solid var(--border);color:var(--text2);}
.trans-table tr:hover td{background:var(--bg);}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A2E;color:#fff;padding:12px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 24px rgba(0,0,0,.2);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.accept-toast{background:var(--mint-d);}
.toast.reject-toast{background:var(--red-d);}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.convert-section{margin-top:4px;}
.convert-btn{width:100%;padding:9px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--lav-d),var(--blue-d));color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:6px;}
.convert-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(106,27,154,.2);}
.convert-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.nfa-info{font-size:11px;color:var(--text3);text-align:center;padding:4px;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>⚡ Automata Visualizer</h1>
    <div class="mode-row" style="display:flex;gap:8px;margin:0;width:auto;">
      <span class="badge active" id="dfa-badge" onclick="setAutomataType('DFA')">DFA</span>
      <span class="badge inactive" id="nfa-badge" onclick="setAutomataType('NFA')">NFA</span>
    </div>
    <div class="topbar-right">
      <button class="btn" style="width:auto;margin:0;padding:6px 12px;" onclick="loadExample()">Load Example</button>
      <button class="btn danger" style="width:auto;margin:0;padding:6px 12px;" onclick="clearAll()">Clear All</button>
    </div>
  </div>

  <div class="left-panel">
    <div class="section-title">Canvas Mode</div>
    <div class="mode-row">
      <button class="mode-btn active" id="mode-select" onclick="setMode('select')">✋ Select</button>
      <button class="mode-btn" id="mode-state" onclick="setMode('addState')">◉ Add State</button>
    </div>
    <div class="mode-row">
      <button class="mode-btn" id="mode-trans" onclick="setMode('addTrans')">→ Transition</button>
      <button class="mode-btn" id="mode-delete" onclick="setMode('delete')">🗑 Delete</button>
    </div>

    <div class="divider"></div>
    <div class="section-title">State Properties</div>
    <div class="input-row">
      <label>State Name</label>
      <input type="text" id="state-name" placeholder="q0, q1, ..." maxlength="5">
    </div>
    <button class="btn btn-primary" onclick="addStateFromInput()">
      <div class="icon" style="background:rgba(255,255,255,.2);">＋</div>Add State
    </button>
    <div class="mode-row" style="margin-top:4px;">
      <button class="btn" style="margin:0;" onclick="toggleStart()"><div class="icon" style="background:var(--mint);">▶</div>Toggle Start</button>
      <button class="btn" style="margin:0;" onclick="toggleFinal()"><div class="icon" style="background:var(--lav);">★</div>Toggle Final</button>
    </div>

    <div class="divider"></div>
    <div class="section-title">Transition</div>
    <div class="input-row">
      <label>Symbol (ε for epsilon)</label>
      <input type="text" id="trans-symbol" placeholder="a, b, 0, 1, ε" maxlength="3">
    </div>
    <button class="btn" onclick="setMode('addTrans')">
      <div class="icon" style="background:var(--lav);">→</div>Draw Transition
    </button>

    <div class="divider"></div>
    <div class="section-title">Alphabet</div>
    <div id="alphabet-display" style="font-size:12px;color:var(--text2);padding:4px;min-height:24px;word-break:break-all;">—</div>

    <div class="divider"></div>
    <div class="section-title">Conversions</div>
    <div class="convert-section">
      <button class="convert-btn" id="nfa-dfa-btn" onclick="convertNFAtoDFA()" disabled>NFA → DFA (Subset)</button>
      <button class="convert-btn" id="min-btn" onclick="minimizeDFA()">Minimize DFA</button>
      <div class="nfa-info" id="conv-info"></div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="main-canvas"></canvas>
    <div class="canvas-hint" id="canvas-hint">
      <div style="font-size:48px;opacity:.3;">◎</div>
      <p>Select "Add State" and click to place states<br>or load an example automaton</p>
    </div>
    <div class="canvas-tools">
      <button class="tool-btn active" id="tool-select" onclick="setMode('select')">Select</button>
      <button class="tool-btn" id="tool-addState" onclick="setMode('addState')">Add State</button>
      <button class="tool-btn" id="tool-addTrans" onclick="setMode('addTrans')">Transition</button>
      <button class="tool-btn" id="tool-delete" onclick="setMode('delete')">Delete</button>
    </div>
  </div>

  <div class="right-panel">
    <div class="card">
      <div class="card-title">Test String</div>
      <div class="sim-string">
        <input type="text" id="test-input" placeholder="e.g. aab" spellcheck="false">
        <button class="run-btn" onclick="startSimulation()">Run ▶</button>
      </div>
      <div class="sim-controls">
        <button class="sim-btn" id="btn-prev" onclick="simStep(-1)" disabled>◀ Prev</button>
        <button class="sim-btn" id="btn-next" onclick="simStep(1)" disabled>Next ▶</button>
        <button class="sim-btn" onclick="autoPlay()">Auto</button>
      </div>
      <div class="step-log" id="step-log"></div>
    </div>

    <div id="result-area"></div>

    <div class="card">
      <div class="card-title">Transition Table</div>
      <div id="trans-table-wrap" style="overflow-x:auto;">
        <div style="font-size:11px;color:var(--text3);text-align:center;">Add states and transitions to see the table</div>
      </div>
    </div>

    <div class="card" id="epsilon-closure-card" style="display:none;">
      <div class="card-title">ε-Closure Info</div>
      <div id="epsilon-info" style="font-size:11px;color:var(--text2);"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

let states = [];
let transitions = [];
let automataType = 'DFA';
let mode = 'select';
let selectedStates = [];
let transFrom = null;
let dragging = null;
let dragOffset = {x:0,y:0};
let simSteps = [];
let simIdx = -1;
let autoTimer = null;
let stateIdCounter = 0;
let lastMouseX = 0, lastMouseY = 0;
let hoverState = null;

function resize(){
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  draw();
}

window.addEventListener('resize', resize);
resize();

// ---- STATE MANAGEMENT ----
function addState(x,y,name){
  const id = 'q'+(stateIdCounter++);
  const nm = name || id;
  states.push({id,name:nm,x,y,isStart:states.length===0,isFinal:false});
  document.getElementById('canvas-hint').style.display='none';
  updateAlphabet();
  updateTable();
  updateConvButtons();
  draw();
  return id;
}

function addStateFromInput(){
  const nm = document.getElementById('state-name').value.trim()||('q'+stateIdCounter);
  const cx = canvas.width/2 + (Math.random()-.5)*200;
  const cy = canvas.height/2 + (Math.random()-.5)*150;
  addState(cx,cy,nm);
  document.getElementById('state-name').value='';
}

function addTransition(fromId,toId,symbol){
  if(automataType==='DFA'){
    const existing = transitions.find(t=>t.from===fromId&&t.symbol===symbol);
    if(existing){showToast('DFA: State already has a transition for "'+symbol+'"','warn');return;}
  }
  const existing2 = transitions.find(t=>t.from===fromId&&t.to===toId&&t.symbol===symbol);
  if(existing2){showToast('Transition already exists','warn');return;}
  transitions.push({from:fromId,to:toId,symbol});
  updateAlphabet();
  updateTable();
  updateConvButtons();
  draw();
}

function toggleStart(){
  if(!selectedStates.length){showToast('Select a state first','warn');return;}
  states.forEach(s=>s.isStart=false);
  const s=states.find(s=>selectedStates.includes(s.id));
  if(s)s.isStart=true;
  draw();
}

function toggleFinal(){
  if(!selectedStates.length){showToast('Select a state first','warn');return;}
  selectedStates.forEach(id=>{
    const s=states.find(st=>st.id===id);
    if(s)s.isFinal=!s.isFinal;
  });
  draw();
}

function setAutomataType(t){
  automataType=t;
  document.getElementById('dfa-badge').className='badge '+(t==='DFA'?'active':'inactive');
  document.getElementById('nfa-badge').className='badge '+(t==='NFA'?'active':'inactive');
  updateConvButtons();
  draw();
}

function setMode(m){
  mode=m;
  transFrom=null;
  ['select','addState','addTrans','delete'].forEach(id=>{
    const btn=document.getElementById('mode-'+id);
    if(btn)btn.classList.toggle('active',id===m);
    const tb=document.getElementById('tool-'+id);
    if(tb)tb.classList.toggle('active',id===m);
  });
  canvas.style.cursor=m==='addState'?'crosshair':m==='delete'?'not-allowed':'default';
  if(m!=='addTrans')transFrom=null;
  draw();
}

function clearAll(){
  states=[];transitions=[];selectedStates=[];transFrom=null;simSteps=[];simIdx=-1;stateIdCounter=0;
  document.getElementById('canvas-hint').style.display='';
  document.getElementById('step-log').innerHTML='';
  document.getElementById('result-area').innerHTML='';
  document.getElementById('epsilon-closure-card').style.display='none';
  updateAlphabet();updateTable();updateConvButtons();draw();
}

// ---- DRAW ----
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
  transitions.forEach(drawTransition);
  if(transFrom&&mode==='addTrans'){
    const fs=states.find(s=>s.id===transFrom);
    if(fs){
      ctx.save();ctx.strokeStyle='#42A5F5';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.moveTo(fs.x,fs.y);ctx.lineTo(lastMouseX,lastMouseY);ctx.stroke();
      ctx.restore();
    }
  }
  states.forEach(drawState);
}

function drawGrid(){
  ctx.save();ctx.strokeStyle='rgba(99,123,199,.07)';ctx.lineWidth=1;
  const sz=28;
  for(let x=0;x<canvas.width;x+=sz){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
  for(let y=0;y<canvas.height;y+=sz){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
  ctx.restore();
}

function drawState(s){
  const R=28;
  const isSelected=selectedStates.includes(s.id);
  const isActive=simIdx>=0&&simSteps[simIdx]&&(Array.isArray(simSteps[simIdx].current)?simSteps[simIdx].current.includes(s.id):simSteps[simIdx].current===s.id);
  const isHover=hoverState===s.id&&mode==='select';
  ctx.save();
  if(isActive){
    ctx.shadowColor='#42A5F5';ctx.shadowBlur=18;
    const grd=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,R+6);
    grd.addColorStop(0,'rgba(66,165,245,.25)');grd.addColorStop(1,'rgba(66,165,245,0)');
    ctx.beginPath();ctx.arc(s.x,s.y,R+8,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  }
  ctx.beginPath();ctx.arc(s.x,s.y,R,0,Math.PI*2);
  if(isActive){ctx.fillStyle='#E3F2FD';}
  else if(isSelected){ctx.fillStyle='#EDE7F6';}
  else if(isHover){ctx.fillStyle='#F0F7FF';}
  else{ctx.fillStyle='#fff';}
  ctx.fill();
  ctx.strokeStyle=isActive?'#1565C0':isSelected?'#6A1B9A':s.isFinal?'#2E7D32':'#9BA0B4';
  ctx.lineWidth=isActive||isSelected?2.5:1.5;
  ctx.stroke();
  if(s.isFinal){
    ctx.beginPath();ctx.arc(s.x,s.y,R-5,0,Math.PI*2);
    ctx.strokeStyle=isActive?'#1565C0':isSelected?'#6A1B9A':'#2E7D32';
    ctx.lineWidth=1.5;ctx.stroke();
  }
  if(s.isStart){
    const arr=40;
    ctx.save();ctx.strokeStyle='#1B5E20';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(s.x-R-arr,s.y);ctx.lineTo(s.x-R-2,s.y);ctx.stroke();
    drawArrowHead(s.x-R-2,s.y,s.x-R-2+1,s.y,10,'#1B5E20');
    ctx.restore();
  }
  ctx.fillStyle=isActive?'#0D47A1':isSelected?'#4A148C':'#1A1A2E';
  ctx.font='600 12px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(s.name,s.x,s.y);
  ctx.restore();
}

function drawTransition(t){
  const from=states.find(s=>s.id===t.from);
  const to=states.find(s=>s.id===t.to);
  if(!from||!to)return;
  const R=28;
  const isActiveEdge=simIdx>0&&simSteps[simIdx]&&simSteps[simIdx].edge&&
    simSteps[simIdx].edge.from===t.from&&simSteps[simIdx].edge.to===t.to&&simSteps[simIdx].edge.symbol===t.symbol;
  const color=isActiveEdge?'#1565C0':'#9BA0B4';
  const lw=isActiveEdge?2.5:1.5;
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=lw;
  if(t.from===t.to){
    const loop=R*1.6;
    const sx=from.x,sy=from.y-R;
    ctx.beginPath();
    ctx.arc(sx,sy-loop/2,loop/2,0,Math.PI*2);
    ctx.stroke();
    const lx=sx,ly=sy-loop;
    ctx.fillStyle=color;ctx.font='600 11px Inter';ctx.textAlign='center';ctx.textBaseline='bottom';
    const sameFromTo=transitions.filter(x=>x.from===t.from&&x.to===t.to);
    const idx=sameFromTo.indexOf(t);
    const offset=(idx-(sameFromTo.length-1)/2)*14;
    ctx.fillText(t.symbol,lx+offset,ly-2);
    ctx.restore();return;
  }
  const sameDir=transitions.filter(x=>x.from===t.from&&x.to===t.to);
  const bothDir=transitions.filter(x=>x.from===t.to&&x.to===t.from);
  const needsCurve=bothDir.length>0||sameDir.length>1;
  const idx=sameDir.indexOf(t);
  const dx=to.x-from.x,dy=to.y-from.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/len,uy=dy/len;
  const sx=from.x+ux*R,sy=from.y+uy*R;
  const ex=to.x-ux*R,ey=to.y-uy*R;
  if(!needsCurve){
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
    drawArrowHead(ex,ey,ex+ux,ey+uy,10,color);
    const mx=(sx+ex)/2,my=(sy+ey)/2;
    const nx=-uy,ny=ux;
    ctx.fillStyle=color;ctx.font='600 11px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.symbol,mx+nx*16,my+ny*16);
  } else {
    const curve=40+(idx*18)*(bothDir.length>0?1:1);
    const mx=(sx+ex)/2,my=(sy+ey)/2;
    const nx=-uy,ny=ux;
    const sign=bothDir.length>0?1:(idx%2===0?1:-1);
    const cx2=mx+nx*curve*sign,cy2=my+ny*curve*sign;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.quadraticCurveTo(cx2,cy2,ex,ey);ctx.stroke();
    const t2=0.95;
    const tx2=(1-t2)*(1-t2)*sx+2*(1-t2)*t2*cx2+t2*t2*ex;
    const ty2=(1-t2)*(1-t2)*sy+2*(1-t2)*t2*cy2+t2*t2*ey;
    drawArrowHead(ex,ey,tx2,ty2,10,color);
    const lmt=0.5;
    const lx=(1-lmt)*(1-lmt)*sx+2*(1-lmt)*lmt*cx2+lmt*lmt*ex;
    const ly=(1-lmt)*(1-lmt)*sy+2*(1-lmt)*lmt*cy2+lmt*lmt*ey;
    ctx.fillStyle=color;ctx.font='600 11px Inter';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.symbol,lx+nx*10*sign,ly+ny*10*sign);
  }
  ctx.restore();
}

function drawArrowHead(x,y,px,py,size,color){
  const angle=Math.atan2(y-py,x-px);
  ctx.save();ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x-size*Math.cos(angle-Math.PI/7),y-size*Math.sin(angle-Math.PI/7));
  ctx.lineTo(x-size*Math.cos(angle+Math.PI/7),y-size*Math.sin(angle+Math.PI/7));
  ctx.closePath();ctx.fill();ctx.restore();
}

// ---- INPUT ----
canvas.addEventListener('mousedown',e=>{
  const {x,y}=canvasXY(e);
  if(mode==='addState'){addState(x,y);return;}
  const hit=stateAt(x,y);
  if(mode==='delete'){
    if(hit){
      states=states.filter(s=>s.id!==hit);
      transitions=transitions.filter(t=>t.from!==hit&&t.to!==hit);
      if(selectedStates.includes(hit))selectedStates=selectedStates.filter(id=>id!==hit);
      updateAlphabet();updateTable();updateConvButtons();draw();
    } else {
      const ti=transitionAt(x,y);
      if(ti!==-1){transitions.splice(ti,1);updateAlphabet();updateTable();updateConvButtons();draw();}
    }
    return;
  }
  if(mode==='addTrans'){
    if(hit){
      if(!transFrom){transFrom=hit;draw();}
      else{
        const sym=document.getElementById('trans-symbol').value.trim()||'a';
        addTransition(transFrom,hit,sym);
        transFrom=null;draw();
      }
    }
    return;
  }
  if(mode==='select'){
    if(hit){
      if(!e.shiftKey)selectedStates=[hit];
      else{
        if(selectedStates.includes(hit))selectedStates=selectedStates.filter(i=>i!==hit);
        else selectedStates.push(hit);
      }
      const s=states.find(st=>st.id===hit);
      dragging=hit;dragOffset={x:x-s.x,y:y-s.y};
    } else {selectedStates=[];}
    draw();
  }
});

canvas.addEventListener('mousemove',e=>{
  const {x,y}=canvasXY(e);
  lastMouseX=x;lastMouseY=y;
  const prev=hoverState;
  hoverState=stateAt(x,y)||null;
  if(dragging&&mode==='select'){
    const s=states.find(st=>st.id===dragging);
    if(s){s.x=x-dragOffset.x;s.y=y-dragOffset.y;}
  }
  if(prev!==hoverState||dragging||mode==='addTrans')draw();
});

canvas.addEventListener('mouseup',()=>{dragging=null;});
canvas.addEventListener('dblclick',e=>{
  const {x,y}=canvasXY(e);
  const hit=stateAt(x,y);
  if(hit){
    const s=states.find(st=>st.id===hit);
    const nm=prompt('Rename state:',s.name);
    if(nm){s.name=nm.trim().substring(0,5);draw();}
  }
});

function canvasXY(e){
  const r=canvas.getBoundingClientRect();
  return{x:e.clientX-r.left,y:e.clientY-r.top};
}
function stateAt(x,y){
  for(let i=states.length-1;i>=0;i--){
    const s=states[i];
    if((x-s.x)**2+(y-s.y)**2<900)return s.id;
  }return null;
}
function transitionAt(x,y){
  for(let i=0;i<transitions.length;i++){
    const t=transitions[i];
    const from=states.find(s=>s.id===t.from);
    const to=states.find(s=>s.id===t.to);
    if(!from||!to)continue;
    const mx=(from.x+to.x)/2,my=(from.y+to.y)/2;
    if((x-mx)**2+(y-my)**2<400)return i;
  }return -1;
}

// ---- ALPHABET ----
function getAlphabet(){
  const syms=new Set(transitions.map(t=>t.symbol).filter(s=>s!=='ε'));
  return [...syms].sort();
}
function updateAlphabet(){
  const alph=getAlphabet();
  document.getElementById('alphabet-display').textContent=alph.length?'Σ = { '+alph.join(', ')+' }':'—';
}

// ---- SIMULATION ----
function startSimulation(){
  const input=document.getElementById('test-input').value;
  simSteps=[];simIdx=-1;
  const start=states.find(s=>s.isStart);
  if(!start){showToast('No start state defined','warn');return;}
  if(!states.length){showToast('No states defined','warn');return;}
  if(automataType==='DFA')runDFA(input,start);
  else runNFA(input,start);
  if(simSteps.length){simIdx=0;renderSimStep();updateSimButtons();}
}

function runDFA(input,start){
  let cur=start.id;
  simSteps.push({current:cur,symbol:null,edge:null,desc:'Start: '+states.find(s=>s.id===cur).name});
  for(let i=0;i<input.length;i++){
    const sym=input[i];
    const t=transitions.find(tr=>tr.from===cur&&tr.symbol===sym);
    if(!t){
      simSteps.push({current:cur,symbol:sym,edge:null,desc:'No transition for "'+sym+'" — STUCK',stuck:true});
      break;
    }
    simSteps.push({current:t.to,symbol:sym,edge:{from:cur,to:t.to,symbol:sym},desc:'Read "'+sym+'": '+states.find(s=>s.id===cur).name+' → '+states.find(s=>s.id===t.to).name});
    cur=t.to;
  }
  const final=states.find(s=>s.id===cur);
  const accepted=final&&final.isFinal&&!simSteps[simSteps.length-1].stuck;
  simSteps.push({current:cur,symbol:null,edge:null,desc:accepted?'✓ Accepted':'✗ Rejected',result:accepted?'accept':'reject'});
}

function epsilonClosure(stateIds){
  const closure=new Set(stateIds);
  const stack=[...stateIds];
  while(stack.length){
    const cur=stack.pop();
    transitions.filter(t=>t.from===cur&&t.symbol==='ε').forEach(t=>{
      if(!closure.has(t.to)){closure.add(t.to);stack.push(t.to);}
    });
  }
  return [...closure];
}

function nfaMove(stateIds,sym){
  const result=new Set();
  stateIds.forEach(id=>{
    transitions.filter(t=>t.from===id&&t.symbol===sym).forEach(t=>result.add(t.to));
  });
  return [...result];
}

function runNFA(input,start){
  let cur=epsilonClosure([start.id]);
  const names=ids=>ids.map(id=>states.find(s=>s.id===id)?.name||id).join(',');
  simSteps.push({current:cur,symbol:null,edge:null,desc:'Start: {'+names(cur)+'}'});
  for(let i=0;i<input.length;i++){
    const sym=input[i];
    const moved=nfaMove(cur,sym);
    const next=epsilonClosure(moved);
    if(!next.length){
      simSteps.push({current:cur,symbol:sym,edge:null,desc:'No transitions for "'+sym+'" — REJECTED',stuck:true});
      break;
    }
    simSteps.push({current:next,symbol:sym,edge:null,desc:'Read "'+sym+'": {'+names(cur)+'} → {'+names(next)+'}'});
    cur=next;
  }
  const accepted=cur.some(id=>states.find(s=>s.id===id)?.isFinal)&&!simSteps[simSteps.length-1].stuck;
  simSteps.push({current:cur,symbol:null,edge:null,desc:accepted?'✓ Accepted':'✗ Rejected',result:accepted?'accept':'reject'});
}

function renderSimStep(){
  const log=document.getElementById('step-log');
  const res=document.getElementById('result-area');
  log.innerHTML='';
  simSteps.forEach((step,i)=>{
    const div=document.createElement('div');
    div.className='step-item'+(i===simIdx?' active':i<simIdx?' done':'');
    div.innerHTML='<span class="step-state">'+(i===0?'▶':step.symbol?'"'+step.symbol+'"':'✔')+'</span><span>'+step.desc+'</span>';
    log.appendChild(div);
    if(i===simIdx)div.scrollIntoView({block:'nearest'});
  });
  const last=simSteps[simIdx];
  if(last&&last.result){
    res.innerHTML='<div class="result-badge '+(last.result==='accept'?'accept':'reject')+'">'+(last.result==='accept'?'✓ ACCEPTED':'✗ REJECTED')+'</div>';
    showToast(last.result==='accept'?'✓ String Accepted!':'✗ String Rejected',last.result==='accept'?'accept':'reject');
  } else{res.innerHTML='';}
  draw();
}

function simStep(dir){
  simIdx=Math.max(0,Math.min(simSteps.length-1,simIdx+dir));
  renderSimStep();updateSimButtons();
}
function updateSimButtons(){
  document.getElementById('btn-prev').disabled=simIdx<=0;
  document.getElementById('btn-next').disabled=simIdx>=simSteps.length-1;
}
function autoPlay(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;return;}
  if(simIdx>=simSteps.length-1){simIdx=0;}
  autoTimer=setInterval(()=>{
    if(simIdx>=simSteps.length-1){clearInterval(autoTimer);autoTimer=null;return;}
    simStep(1);
  },700);
}

// ---- TABLE ----
function updateTable(){
  const wrap2=document.getElementById('trans-table-wrap');
  const alph=getAlphabet();
  if(!states.length){wrap2.innerHTML='<div style="font-size:11px;color:var(--text3);text-align:center;">Add states and transitions to see the table</div>';return;}
  let html='<table class="trans-table"><thead><tr><th>State</th>';
  const syms=[...alph];
  if(automataType==='NFA')syms.push('ε');
  syms.forEach(s=>html+='<th>'+s+'</th>');
  html+='</tr></thead><tbody>';
  states.forEach(s=>{
    const marker=(s.isStart?'→':'')+(s.isFinal?'*':'');
    html+='<tr><td><b>'+marker+s.name+'</b></td>';
    syms.forEach(sym=>{
      const ts=transitions.filter(t=>t.from===s.id&&t.symbol===sym).map(t=>states.find(x=>x.id===t.to)?.name||'?');
      html+='<td>'+(ts.length?ts.join(','):'-')+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  wrap2.innerHTML=html;

  // Epsilon closure display
  if(automataType==='NFA'){
    const card=document.getElementById('epsilon-closure-card');
    const info=document.getElementById('epsilon-info');
    card.style.display='';
    const lines=states.map(s=>{
      const cl=epsilonClosure([s.id]);
      const names=cl.map(id=>states.find(x=>x.id===id)?.name||id).join(', ');
      return 'ε-closure('+s.name+') = {'+names+'}';
    });
    info.innerHTML=lines.map(l=>'<div style="margin-bottom:3px;">'+l+'</div>').join('');
  } else {
    document.getElementById('epsilon-closure-card').style.display='none';
  }
}

function updateConvButtons(){
  document.getElementById('nfa-dfa-btn').disabled=automataType!=='NFA';
  document.getElementById('conv-info').textContent=automataType==='NFA'?'Switch to NFA mode to convert':'';
}

// ---- NFA TO DFA (SUBSET CONSTRUCTION) ----
function convertNFAtoDFA(){
  const start=states.find(s=>s.isStart);
  if(!start){showToast('No start state','warn');return;}
  const alph=getAlphabet();
  if(!alph.length){showToast('No alphabet symbols (non-ε) found','warn');return;}

  const dfaStates=[];
  const dfaTrans=[];
  let dfaCounter=0;

  function getOrCreate(ids){
    const key=[...ids].sort().join(',');
    let ds=dfaStates.find(s=>s.key===key);
    if(!ds){
      const nm='D'+dfaCounter++;
      const isFinal=ids.some(id=>states.find(s=>s.id===id)?.isFinal);
      ds={key,name:nm,nfaStates:ids,isFinal,id:'dfa_'+nm};
      dfaStates.push(ds);
    }
    return ds;
  }

  const startClosure=epsilonClosure([start.id]);
  const startDFA=getOrCreate(startClosure);
  const queue=[startDFA];
  const visited=new Set();

  while(queue.length){
    const cur=queue.shift();
    if(visited.has(cur.key))continue;
    visited.add(cur.key);
    alph.forEach(sym=>{
      const moved=nfaMove(cur.nfaStates,sym);
      const closure=epsilonClosure(moved);
      if(!closure.length)return;
      const next=getOrCreate(closure);
      dfaTrans.push({from:cur.id,to:next.id,symbol:sym});
      if(!visited.has(next.key))queue.push(next);
    });
  }

  // Lay out new DFA
  const cols=Math.ceil(Math.sqrt(dfaStates.length));
  const spacing=130;
  const ox=(canvas.width-(cols-1)*spacing)/2;
  const oy=100;

  states=dfaStates.map((ds,i)=>({
    id:ds.id,name:ds.name,
    x:ox+(i%cols)*spacing,
    y:oy+Math.floor(i/cols)*spacing,
    isStart:ds===startDFA,
    isFinal:ds.isFinal
  }));
  transitions=dfaTrans;
  setAutomataType('DFA');
  updateAlphabet();updateTable();updateConvButtons();
  simSteps=[];simIdx=-1;
  document.getElementById('step-log').innerHTML='';
  document.getElementById('result-area').innerHTML='';
  draw();
  showToast('NFA → DFA converted! ('+dfaStates.length+' states)','accept');
}

// ---- DFA MINIMIZATION ----
function minimizeDFA(){
  if(!states.length){showToast('No automaton to minimize','warn');return;}
  const alph=getAlphabet();
  if(!alph.length){showToast('No alphabet','warn');return;}

  // Get non-unreachable states
  const reachable=new Set();
  const queue2=[states.find(s=>s.isStart)?.id].filter(Boolean);
  while(queue2.length){
    const cur=queue2.shift();
    if(reachable.has(cur))continue;
    reachable.add(cur);
    transitions.filter(t=>t.from===cur).forEach(t=>{if(!reachable.has(t.to))queue2.push(t.to);});
  }
  const reachStates=states.filter(s=>reachable.has(s.id));

  // Initial partition: final vs non-final
  let partitions=[
    reachStates.filter(s=>s.isFinal).map(s=>s.id),
    reachStates.filter(s=>!s.isFinal).map(s=>s.id)
  ].filter(p=>p.length>0);

  function getGroup(id){return partitions.findIndex(p=>p.includes(id));}

  let changed=true;
  while(changed){
    changed=false;
    const newPartitions=[];
    partitions.forEach(group=>{
      if(group.length<=1){newPartitions.push(group);return;}
      const sub=[];
      group.forEach(id=>{
        const sig=alph.map(sym=>{
          const t=transitions.find(tr=>tr.from===id&&tr.symbol===sym);
          return t?getGroup(t.to):-1;
        }).join(',');
        const match=sub.find(s=>s.sig===sig);
        if(match)match.ids.push(id);
        else sub.push({sig,ids:[id]});
      });
      if(sub.length>1)changed=true;
      sub.forEach(s=>newPartitions.push(s.ids));
    });
    partitions=newPartitions;
  }

  if(partitions.length===reachStates.length){
    showToast('DFA is already minimal! ('+reachStates.length+' states)','accept');return;
  }

  // Build minimized DFA
  const cols=Math.ceil(Math.sqrt(partitions.length));
  const spacing=130;
  const ox=(canvas.width-(cols-1)*spacing)/2;
  const oy=100;

  const newStates=partitions.map((group,i)=>{
    const rep=reachStates.find(s=>s.id===group[0]);
    const isFinal=group.some(id=>reachStates.find(s=>s.id===id)?.isFinal);
    const isStart=group.some(id=>reachStates.find(s=>s.id===id)?.isStart);
    return{id:'min_'+i,name:'M'+i,x:ox+(i%cols)*spacing,y:oy+Math.floor(i/cols)*spacing,isFinal,isStart};
  });

  const newTrans=[];
  partitions.forEach((group,gi)=>{
    const rep=group[0];
    alph.forEach(sym=>{
      const t=transitions.find(tr=>tr.from===rep&&tr.symbol===sym);
      if(!t)return;
      const targetGroup=partitions.findIndex(p=>p.includes(t.to));
      if(targetGroup===-1)return;
      const already=newTrans.find(x=>x.from==='min_'+gi&&x.to==='min_'+targetGroup&&x.symbol===sym);
      if(!already)newTrans.push({from:'min_'+gi,to:'min_'+targetGroup,symbol:sym});
    });
  });

  states=newStates;transitions=newTrans;
  updateAlphabet();updateTable();updateConvButtons();
  simSteps=[];simIdx=-1;
  document.getElementById('step-log').innerHTML='';
  document.getElementById('result-area').innerHTML='';
  draw();
  showToast('Minimized! '+reachStates.length+' → '+partitions.length+' states','accept');
}

// ---- EXAMPLE ----
function loadExample(){
  clearAll();
  automataType='DFA';
  document.getElementById('dfa-badge').className='badge active';
  document.getElementById('nfa-badge').className='badge inactive';
  const cx=canvas.width/2,cy=canvas.height/2;
  const q0=addState(cx-200,cy,'q0');
  const q1=addState(cx,cy,'q1');
  const q2=addState(cx+200,cy,'q2');
  states.find(s=>s.id===q0).isStart=true;
  states.find(s=>s.id===q2).isFinal=true;
  addTransition(q0,q1,'a');
  addTransition(q0,q0,'b');
  addTransition(q1,q2,'b');
  addTransition(q1,q1,'a');
  addTransition(q2,q2,'b');
  addTransition(q2,q1,'a');
  document.getElementById('test-input').value='ab';
  updateAlphabet();updateTable();updateConvButtons();draw();
  showToast('Loaded: DFA accepting strings ending in "ab"','accept');
}

// ---- TOAST ----
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show '+(type==='accept'?'accept-toast':type==='reject'?'reject-toast':'');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2800);
}

// ---- INIT ----
setMode('select');
updateConvButtons();
draw();
